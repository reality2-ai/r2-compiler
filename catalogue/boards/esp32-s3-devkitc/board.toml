# board.toml — Espressif ESP32-S3-DevKitC-1.
#
# Schema: SPEC-CATALOGUE-LAYOUT §3.2.
# Source of truth for all r2-composer decisions about this carrier.
#
# Authored 2026-05-31 by reading r2-workshop/firmware/esp32-s3/devkitc/
# and r2-workshop/specifications/HARDWARE-WIRING-DEVKITC.md.

[board]
name        = "esp32-s3-devkitc"
arch        = "esp32"                              # R2-COMPILE §4 platform tag
chip        = "esp32s3"                            # ESP-IDF chip-family slug
carrier     = "devkitc"                            # SPEC-R2-WORKSHOP-SENSOR §3.3.1 carrier slug
version     = "0.2.0"
description = """\
Espressif ESP32-S3-DevKitC-1 — Espressif's reference development board \
for the ESP32-S3 family. Xtensa LX7 dual-core (240 MHz), WiFi + BLE 5. \
Reference variant is the N8R8: 8 MB flash + 8 MB octal PSRAM. Two USB \
ports: native USB-OTG (USB-Serial-JTAG console + flash) and a CP2102 \
UART. On-board addressable RGB LED (WS2812) on GPIO38 (v1.1) or GPIO48 \
(v1.0). 45 broken-out GPIOs — the high-GPIO-count Xtensa carrier in \
r2-workshop, current default per ADR-002.\
"""

[build]
target_triple   = "xtensa-esp32s3-espidf"          # R2-BUILD §2 — Xtensa family
toolchain       = "esp"                            # via `espup install`
esp_idf_version = "v5.2.5"
flash_size_mb   = 8                                # CONFIG_ESPTOOLPY_FLASHSIZE_8MB (N8R8 reference variant)
psram           = true                             # 8 MB octal PSRAM (R8 variant)
psram_mode      = "octal"
psram_speed_mhz = 80
usb_serial_jtag = true                             # native USB-OTG console
uart_cp2102     = true                             # second USB port via CP2102

[usb]
# Per SPEC-APIARY-FLASH §4.1. The DevKitC exposes TWO USB ports: the
# native USB-Serial-JTAG (vid 0x303a, pid 0x1001) AND an on-board
# CP2102 UART bridge (vid 0x10c4, pid 0xea60). The usb-watcher plugin
# MUST prefer the native port for flashing. VID/PID 0x303a/0x1001 is
# shared with ESP32-C6; `chip_id_probe` is the disambiguator.
vid               = 0x303a                         # Espressif native USB-Serial-JTAG (primary)
pid               = 0x1001
chip_id_probe     = "esp32s3"
esptool_chip_arg  = "esp32s3"
identify_strategy = "vid_pid_then_chip_id"
reset_strategy    = "usb_serial_jtag"
flash_offsets     = { bootloader = 0x0, partition_table = 0x8000, ota_0 = 0x20000 }
secondary_uart    = { vid = 0x10c4, pid = 0xea60, role = "cp2102-console" }   # informative

[compile_target]
tag = "esp32-s3"                                   # R2-DEF §7.7 — shared with esp32-s3-xiao

[capabilities]
# Hive-shared singletons this carrier exposes.
provides = [
    "r2.hw.spi",          # multiple — SPI2/FSPI used by r2-workshop for ADXL355 + SD
    "r2.hw.i2c",          # available (not used by rocker-sensor)
    "r2.hw.gpio",         # 45 broken-out pins
    "r2.hw.adc",          # ADC1 = GPIO1-GPIO10, ADC2 = GPIO11-GPIO20 (ADC2 unusable while WiFi active)
    "r2.hw.uart",         # multiple
    "r2.hw.ble",          # BLE 5, NimBLE host stack
    "r2.hw.wifi",         # WiFi 4 (2.4 GHz)
    "r2.hw.flash",        # 8 MB internal
    "r2.hw.psram",        # 8 MB octal
    "r2.hw.sdspi",        # SD card on shared SPI bus
    "r2.hw.ws2812",       # on-board WS2812 RGB LED (GPIO38 on v1.1)
    "r2.hw.rmt",          # used to drive the WS2812
    "r2.hw.usb-serial-jtag",
    "r2.hw.usb-uart",     # CP2102
]

absent = []                                        # none we care about for the rocker-sensor scope

[pinout]

[pinout.gpio.GPIO4]
description = "ADC1_CH3 — battery sense (Phase 3); J1 pin 4"
silk        = "4"
header      = "J1.4"
functions   = ["digital", "adc", "rtc"]
role_hint   = "battery-sense"

[pinout.gpio.GPIO9]
description = "SD chip-select (Phase 2 wiring); J1 pin 15"
silk        = "9"
header      = "J1.15"
functions   = ["digital"]
role_hint   = "sd-cs"

[pinout.gpio.GPIO10]
description = "ADXL355 chip-select; J1 pin 16. FSPICS0 default."
silk        = "10"
header      = "J1.16"
functions   = ["digital", "spi-cs"]
role_hint   = "accel-cs"

[pinout.gpio.GPIO11]
description = "SPI MOSI — shared ADXL355 + SD; J1 pin 17. FSPID default."
silk        = "11"
header      = "J1.17"
functions   = ["digital", "spi"]
role_hint   = "spi-mosi"

[pinout.gpio.GPIO12]
description = "SPI SCLK — shared; J1 pin 18. FSPICLK default."
silk        = "12"
header      = "J1.18"
functions   = ["digital", "spi"]
role_hint   = "spi-sck"

[pinout.gpio.GPIO13]
description = "SPI MISO — shared; J1 pin 19. FSPIQ default."
silk        = "13"
header      = "J1.19"
functions   = ["digital", "spi"]
role_hint   = "spi-miso"

[pinout.gpio.GPIO14]
description = "ADXL355 DRDY (interrupt input); J1 pin 20"
silk        = "14"
header      = "J1.20"
functions   = ["digital"]
role_hint   = "accel-drdy"

[pinout.gpio.GPIO15]
description = "SD card-detect (optional); J1 pin 8"
silk        = "15"
header      = "J1.8"
functions   = ["digital"]
role_hint   = "sd-cd"

[pinout.gpio.GPIO38]
description = "On-board WS2812 RGB LED (DevKitC-1 v1.1 — current production). RMT-driven status indicator."
silk        = "38"
functions   = ["digital", "rmt"]
role_hint   = "status-led-ws2812"

[pinout.gpio.GPIO48]
description = "On-board WS2812 RGB LED on DevKitC-1 v1.0 hardware ONLY. v1.1 routes the LED to GPIO38 instead — check silkscreen near the LED to identify board revision."
silk        = "48"
functions   = ["digital", "rmt"]
role_hint   = "status-led-ws2812-v10"

# Pins not safe to wire (strapping / USB / PSRAM / UART0):
[pinout.reserved]
"GPIO0"  = "Strapping pin (boot mode)"
"GPIO3"  = "Strapping pin (JTAG signal source select)"
"GPIO19" = "USB-D−"
"GPIO20" = "USB-D+"
"GPIO35" = "Octal PSRAM (R8/R16V variants)"
"GPIO36" = "Octal PSRAM"
"GPIO37" = "Octal PSRAM"
"GPIO43" = "UART0 TX (serial console)"
"GPIO44" = "UART0 RX (serial console)"
"GPIO45" = "Strapping (VDD_SPI voltage)"
"GPIO46" = "Strapping (ROM print)"

# Available for future expansion (informative):
[pinout.free]
gpio = ["GPIO1", "GPIO2", "GPIO5", "GPIO6", "GPIO7", "GPIO8", "GPIO16", "GPIO17", "GPIO18", "GPIO21", "GPIO39", "GPIO40", "GPIO41", "GPIO42", "GPIO47"]

[references]
vendor_url        = "https://docs.espressif.com/projects/esp-dev-kits/en/latest/esp32s3/esp32-s3-devkitc-1/index.html"
chip_vendor_url   = "https://www.espressif.com/en/products/socs/esp32-s3"
wiring_guide      = "HARDWARE-WIRING-DEVKITC.md"

[compulsory_plugins]
# Per SPEC-R2-COMPOSER §12.1 + [[project-compulsory-plugins-and-virgin-boards]].
capabilities = ["ai.reality2.deploy.ota"]
prefer       = ["ota-tcp"]                         # esp_ota_*-based, runs over TCP port 21043 on the WiFi STA

[notes]
gotchas = [
    "Custom partitions.csv requires a second clean rebuild on a fresh checkout — esp-idf-sys's CMake build dir doesn't exist on first build; build.rs walks up to find it and copies partitions.csv there.",
    "First install MUST be a USB flash (espflash/esptool) to write the partition table + both OTA slots. OTA-over-WiFi only works after that initial flash.",
    "Strapping pins GPIO0/3/45/46 must NOT be wired to peripherals — they're sampled at boot for boot-mode / SPI voltage / ROM printing.",
    "GPIO35/36/37 are claimed by octal PSRAM on R8/R16V variants — do NOT wire them. (They're free on no-PSRAM variants, but the firmware's sdkconfig.defaults assumes R8.)",
    "ADC2 (GPIO11-GPIO20) is unusable while WiFi is active. Battery sense (GPIO4) deliberately uses ADC1.",
    "USB-Serial-JTAG console routes log::info! to whichever USB cable is connected — the CP2102-UART side or the native USB-OTG side. CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y is the relevant setting.",
    "WS2812 GPIO differs between board revisions: v1.1 = GPIO38, v1.0 = GPIO48. Check the silkscreen near the LED. Most current production boards are v1.1.",
    "Use esptool (Python, ESP-IDF-bundled) for flashing, NOT espflash, per R2-BUILD §5.1 — espflash v3.x writes a header byte that breaks ESP-IDF v5.3+ bootloaders.",
    "WS2812 brightness uncapped is retinopathic in a room. r2-workshop caps at 20%; don't raise without a diffuser.",
]
