# board.toml — Seeed Studio XIAO ESP32-S3 (Pre-Soldered).
#
# Schema: SPEC-CATALOGUE-LAYOUT §3.2.
#
# Authored 2026-05-31 by reading r2-workshop/firmware/esp32-s3/xiao/
# and r2-workshop/specifications/HARDWARE-WIRING-XIAO.md.

[board]
name        = "esp32-s3-xiao"
arch        = "esp32"
chip        = "esp32s3"
carrier     = "xiao"
version     = "0.2.0"
description = """\
Seeed Studio XIAO ESP32-S3 (Pre-Soldered SKU) — coin-sized 21 × 17.5 mm \
ESP32-S3 board around the ESP32-S3R8 die (Xtensa LX7 dual-core, 8 MB \
flash + 8 MB octal PSRAM). USB-C with native USB-Serial-JTAG. On-board \
LiPo charger + buck regulator with BAT+/BAT− solder pads on the back \
(no JST-PH). Only 11 broken-out GPIOs (D0–D10). FSM status LED is the \
on-board mono yellow LED on GPIO21 (LEDC PWM driven) — same mono-LED \
pattern as the dfr1117 carrier, no external WS2812 required. r2-workshop's \
alternative Xtensa carrier (ADR-001 promoted it briefly, ADR-002 reverted \
default to DevKitC); fully supported.\
"""

[build]
target_triple   = "xtensa-esp32s3-espidf"
toolchain       = "esp"
esp_idf_version = "v5.2.5"
flash_size_mb   = 8                                # CONFIG_ESPTOOLPY_FLASHSIZE_8MB
psram           = true                             # 8 MB octal (ESP32-S3R8 die)
psram_mode      = "octal"
psram_speed_mhz = 80
usb_serial_jtag = true                             # USB-C, native
uart_cp2102     = false                            # XIAO has only one USB port (USB-C native)

[compile_target]
tag = "esp32-s3"                                   # R2-DEF §7.7 — shared with esp32-s3-devkitc

[capabilities]
provides = [
    "r2.hw.spi",          # single SPI bus (FSPI on D8/D9/D10)
    "r2.hw.i2c",          # available (not used by rocker-sensor)
    "r2.hw.gpio",         # 11 broken-out pins (D0-D10), plus on-board user LED on GPIO21
    "r2.hw.adc",          # all D0-D10 are ADC1-capable
    "r2.hw.uart",         # primary UART on D6/D7
    "r2.hw.ble",          # BLE 5, NimBLE
    "r2.hw.wifi",         # WiFi 4 (2.4 GHz)
    "r2.hw.flash",        # 8 MB
    "r2.hw.psram",        # 8 MB octal
    "r2.hw.sdspi",        # SD on shared SPI bus
    "r2.hw.ledc",         # used to drive the on-board mono LED (GPIO21)
    "r2.hw.usb-serial-jtag",
    "r2.hw.lipo-charger", # on-board (USB-C charging)
    "r2.hw.lipo-buck",    # on-board buck regulator (cell direct → 3.3 V)
]

absent = [
    "r2.hw.ws2812-onboard",  # no on-board addressable RGB LED (FSM uses the mono GPIO21 LED instead — colour info isn't surfaced on this carrier)
    "r2.hw.usb-uart",        # no CP2102 — only the one USB-C native port
    "r2.hw.lipo-jst-ph",     # no JST-PH connector; cell solders to BAT+/BAT- pads on the back
]

[pinout]

[pinout.gpio.GPIO1]
description = "ADXL355 chip-select (D0 silk)"
silk        = "D0"
functions   = ["digital", "adc"]
role_hint   = "accel-cs"

[pinout.gpio.GPIO2]
description = "ADXL355 DRDY (D1 silk, polled in v0.1 — optional)"
silk        = "D1"
functions   = ["digital", "adc"]
role_hint   = "accel-drdy"

[pinout.gpio.GPIO4]
description = "ADC1_CH3 — battery sense (D3 silk)"
silk        = "D3"
functions   = ["digital", "adc", "rtc"]
role_hint   = "battery-sense"

[pinout.gpio.GPIO5]
description = "SD chip-select (D4 silk)"
silk        = "D4"
functions   = ["digital", "adc"]
role_hint   = "sd-cs"

[pinout.gpio.GPIO6]
description = "Spare digital GPIO (D5 silk pad). Not used by the FSM — status LED is the on-board mono yellow LED on GPIO21."
silk        = "D5"
functions   = ["digital", "rmt"]
role_hint   = "spare"

[pinout.gpio.GPIO7]
description = "SPI SCK — shared ADXL355 + SD (D8 silk). XIAO default."
silk        = "D8"
functions   = ["digital", "spi"]
role_hint   = "spi-sck"

[pinout.gpio.GPIO8]
description = "SPI MISO — shared ADXL355 + SD (D9 silk). XIAO default."
silk        = "D9"
functions   = ["digital", "spi"]
role_hint   = "spi-miso"

[pinout.gpio.GPIO9]
description = "SPI MOSI — shared ADXL355 + SD (D10 silk). XIAO default."
silk        = "D10"
functions   = ["digital", "spi"]
role_hint   = "spi-mosi"

[pinout.gpio.GPIO21]
description = "On-board user LED (mono yellow, LEDC PWM driven). The FSM status indicator on this carrier — same mono-LED pattern as the dfr1117 carrier's GPIO15. Colour information is not surfaced on the XIAO; states are distinguished by blink rate / duty cycle."
silk        = "(on-board)"
functions   = ["digital", "ledc"]
role_hint   = "status-led"

# Reserved / strapping / unsafe:
[pinout.reserved]
"GPIO3"  = "Strapping pin (JTAG signal source select) — D2 silk; do not wire"
"GPIO43" = "UART0 TX — D6 silk; reserved for external UART console"
"GPIO44" = "UART0 RX — D7 silk; reserved for external UART console"

# Strapping pins GPIO0/45/46 and USB pins GPIO19/20 are NOT exposed on the
# XIAO header — no risk of accidental wiring.

[pinout.free]
gpio = ["GPIO6", "GPIO3", "GPIO43", "GPIO44"]  # GPIO6 (D5 silk) is freed by the mono-LED choice; GPIO3/43/44 are subject to strapping / UART caveats above

[references]
vendor_url        = "https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/"
product_url       = "https://www.seeedstudio.com/Seeed-Studio-XIAO-ESP32S3-Pre-Soldered-p-6334.html"
chip_vendor_url   = "https://www.espressif.com/en/products/socs/esp32-s3"
wiring_guide      = "HARDWARE-WIRING-XIAO.md"

[compulsory_plugins]
# Per SPEC-R2-COMPILER §12.1 + [[project-compulsory-plugins-and-virgin-boards]].
capabilities = ["ai.reality2.deploy.ota"]
prefer       = ["ota-tcp"]                         # esp_ota_*-based, runs over TCP port 21043 on the WiFi STA

[notes]
gotchas = [
    "Custom partitions.csv requires a second clean rebuild on a fresh checkout (same as DevKitC).",
    "First install MUST be a USB flash; OTA over WiFi only works after.",
    "Cell wires solder directly to BAT+/BAT- pads on the back of the board — there is NO JST-PH connector. Disconnecting the cell requires de-soldering.",
    "On-board LiPo charger has NO over-discharge protection. Use a protected 18650 cell, or physically disconnect the cell when idle for >24 h.",
    "FSM status LED is the on-board mono yellow LED on GPIO21 (LEDC PWM) — same mono-LED pattern as the dfr1117. Colour information is NOT surfaced on this carrier; states are distinguished by blink rate. No external WS2812 module required.",
    "D2/GPIO3 is a strapping pin (JTAG signal source select) — do not wire.",
    "XIAO ESP32-S3 Plus SKU has different flash/PSRAM (16 MB flash) AND additional GPIOs D11-D18 — treat as a SEPARATE board entry when added; sdkconfig.defaults differs.",
    "Bootloader mode: if espflash can't detect the chip, hold BOOT button while pressing/releasing RESET. Most of the time not needed — USB-Serial-JTAG drops into bootloader automatically when espflash resets it.",
    "Use esptool, not espflash, per R2-BUILD §5.1.",
    "LED brightness should be capped (≤ 20% duty) — uncapped is harsh in a room.",
    "DIVERGENCE FROM SYNCED TEMPLATES (2026-05-31): templates/Cargo.toml.tera still declares ws2812-esp32-rmt-driver and smart-leds (synced from r2-workshop, which currently uses the external WS2812 on D5). The Compiler sentant MUST drop those deps and emit LEDC-PWM driver code for GPIO21 instead, per this board.toml's pinout. This divergence resolves when r2-workshop's xiao firmware catches up to the mono-LED design — see [[project-xiao-led-choice]] in memory.",
]
