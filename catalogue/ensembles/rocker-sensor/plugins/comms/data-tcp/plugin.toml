[plugin]
name        = "data-tcp"
category    = "comms"
version     = "0.1.0"
description = "TCP server on port 21047 implementing LIST / GET / DEL / DEL_ALL over the captures directory on the SD card. Used by the dashboard to download named capture files and to free SD space remotely (SPEC-R2-WORKSHOP-CAPTURE §6)."

# no_std corrected false→true during Phase 1.4-source: the extracted
# plugin is the LIST/GET/DEL/DEL_ALL protocol core + a `CaptureStore`
# trait — no_std + alloc (request parsing + file lists); the SD captures
# dir + TCP accept loop live in the firmware.
[modes]
aot = { targets = ["esp32-s3"], no_std = true }   # protocol core; store via storage/sd-card
nif = false
web = false

[commands]
init     = 0x01

[capabilities]
provides = ["ai.reality2.workshop.cap.data-tcp"]
requires = [
    "r2.net.tcp",
    "ai.reality2.workshop.cap.sd-ring",   # provided by storage/sd-card
]

[events]
handled = ["r2.dash.data.list", "r2.dash.data.get", "r2.dash.data.delete"]
emitted = ["comms/data-tcp"]

[credentials]
